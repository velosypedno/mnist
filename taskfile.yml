version: '3'

vars:
  DATA_DIR: "./data"
  TRAIN_IMAGES: "{{.DATA_DIR}}/train-images-idx3-ubyte/train-images-idx3-ubyte"
  TRAIN_LABELS: "{{.DATA_DIR}}/train-labels-idx1-ubyte/train-labels-idx1-ubyte"
  TEST_IMAGES: "{{.DATA_DIR}}/t10k-images-idx3-ubyte/t10k-images-idx3-ubyte"
  TEST_LABELS: "{{.DATA_DIR}}/t10k-labels-idx1-ubyte/t10k-labels-idx1-ubyte"
  MODEL_PATH: "./models/mnist.gob"

tasks:
  init:
    desc: Prepare directories and unpack dataset
    internal: true
    cmds:
      - mkdir -p data models
      - unzip -n dataset.zip -d {{.DATA_DIR}}
    status:
      - test -d {{.DATA_DIR}}/train-images-idx3-ubyte
      - test -d models

  train:
    desc: Train the neural network on MNIST data
    deps: [init]
    cmds:
      - go run cmd/train/main.go -images={{.TRAIN_IMAGES}} -labels={{.TRAIN_LABELS}} -output={{.MODEL_PATH}}

  validate:
    desc: Run evaluation on test data
    vars:
      MODEL: '{{default .MODEL_PATH .MODEL}}'
    cmds:
      - go run cmd/validate/main.go -images={{.TEST_IMAGES}} -labels={{.TEST_LABELS}} -model={{.MODEL}}

  all:
    desc: Run training and then validation
    cmds:
      - task: train
      - task: validate
